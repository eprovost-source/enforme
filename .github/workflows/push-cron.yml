name: push-reminders
# Déclenche /api/cron fréquemment pour envoyer les rappels push (app fermée).
on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 minutes (UTC, best-effort)
  workflow_dispatch: {}      # permet un déclenchement manuel pour tester

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher la vérification des rappels
        run: |
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://enforme-git-master-eprovost-sources-projects.vercel.app/api/cron")
          echo "HTTP $code"
          cat /tmp/out.txt
          test "$code" = "200"
